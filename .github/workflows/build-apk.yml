name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release を作成する'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build debug APK
        run: cd android-app && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' android-app/app/build.gradle.kts | grep -oP '"\K[^"]+')
          cp android-app/app/build/outputs/apk/debug/app-debug.apk              ocrreader-v${VERSION}-debug.apk
          echo "APK_NAME=ocrreader-v${VERSION}-debug.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', env.VERSION) }}
          name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: ${{ env.APK_NAME }}
          generate_release_notes: true
