name: Setup Keystore (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check if keystore already exists
        id: check
        run: |
          if [ -f android-app/app/debug.keystore ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate debug keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          keytool -genkey -v \
            -keystore android-app/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Commit keystore to repo
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add android-app/app/debug.keystore
          git commit -m "chore: add fixed debug keystore for consistent APK signing"
          git push
